# Cargo workspace tying together the Rust pieces of Compose.
#
# The harness layer is a small publishable crate family — a leaf engine, a
# standalone unofficial bob SDK, and an umbrella framework:
#
#   * `crates/cli-stream` — generic streaming subprocess engine (spawn /
#                           stream stdout-stderr lines / cancel / PATH
#                           augment). No agent knowledge; the two crates
#                           below depend on it. Publishable.
#   * `crates/bob-rs`     — unofficial bob SDK: detection, install
#                           streaming, OS keychain, `spawn_bob`. Depends
#                           ONLY on cli-stream → truly standalone (no
#                           harness framework). Publishable.
#   * `crates/agent-harness` (imported as `harness`)
#                         — the umbrella framework: the `Harness` trait, the
#                           `RunEvent` vocabulary, the open `Registry`, plus
#                           the built-in bob/claude/codex adapters as
#                           feature-gated modules (`bob` wraps bob-rs;
#                           claude/codex use cli-stream directly). With
#                           `default-features = false` it's the lean
#                           framework others build custom providers on.
#                           Publishable.
#   * `crates/bob-api`    — dev-only axum HTTP+SSE server. Wraps `bob-rs`
#                           so the browser preview reaches the same spawn
#                           code as the desktop build. Not shipped.
#   * `crates/workspace-index` (+ `-wasm`)
#                         — pure markdown index/search core, compiled both
#                           native (for `src-tauri`) and to WASM (for the
#                           browser). Compose-internal.
#   * `src-tauri`         — Tauri desktop host. Resolves the active harness
#                           through `agent-harness`'s registry. Production runtime.
#
# The dependency arrow only points "up": cli-stream ← bob-rs; cli-stream ←
# agent-harness → bob-rs (its `bob` adapter module). cli-stream knows no
# agent abstraction; bob-rs never learns about the harness framework.
#
# Why a workspace at all (vs. independent crates):
#   * the hosts + adapters share crates via path deps. A workspace gives
#     them one Cargo.lock so the same versions compile everywhere — no
#     dev/prod skew where the browser preview runs different logic than
#     the desktop binary.
#   * `cargo test` / `cargo check` from the repo root touch everything,
#     so CI doesn't need per-crate invocations.
[workspace]
resolver = "2"
members = [
  "crates/cli-stream",
  "crates/agent-harness",
  "crates/bob-rs",
  "crates/bob-api",
  "crates/workspace-index",
  "crates/workspace-index-wasm",
  "src-tauri",
]

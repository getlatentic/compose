# Cargo workspace for the Compose app's Rust crates.
#
# The harness layer (the framework + the unofficial bob SDK + the streaming
# engine) now lives in its OWN repository:
#
#     https://github.com/tosinamuda/agent-harness
#
# as the publishable crates `agent-harness` / `bob-rs` / `cli-stream`.
# Compose consumes them as a **git dependency** (see `src-tauri` and
# `crates/bob-api`), so they are NOT workspace members here. When those
# crates are published to crates.io, swap the `git = …` deps for `version`.
#
# Members (Compose-internal only):
#   * `crates/bob-api`    — dev-only axum HTTP+SSE server. Wraps the external
#                           `bob-rs` so the browser preview reaches the same
#                           spawn code as the desktop build. Not shipped.
#   * `crates/workspace-index` (+ `-wasm`)
#                         — pure markdown index/search core, compiled both
#                           native (for `src-tauri`) and to WASM (for the
#                           browser). Compose-internal.
#   * `src-tauri`         — Tauri desktop host. Resolves the active harness
#                           through the external `agent-harness` registry.
#                           The production runtime.
#
# Developing the harness against Compose locally: rather than push + `cargo
# update` on every harness edit, add an (uncommitted) patch to a local
# checkout, e.g.
#   [patch."https://github.com/tosinamuda/agent-harness"]
#   agent-harness = { path = "../agent-harness/crates/agent-harness" }
#   bob-rs        = { path = "../agent-harness/crates/bob-rs" }
#   cli-stream    = { path = "../agent-harness/crates/cli-stream" }
[workspace]
resolver = "2"
members = [
  "crates/bob-api",
  "crates/workspace-index",
  "crates/workspace-index-wasm",
  "src-tauri",
]

# Cargo workspace tying together the Rust pieces of Compose.
#
# Members:
#   * `crates/bob-core`   — pure Rust library: bob CLI detection,
#                           install streaming, OS keychain access,
#                           `bob` spawn + stream parsing. No
#                           Tauri / no axum / no Node deps, and no
#                           dependency on the Compose harness layer.
#                           Kept standalone so it can be published as
#                           an unofficial bob SDK.
#   * `crates/compose-core`
#                         — Compose's neutral agent-harness layer:
#                           the `Harness` trait, the `bob` adapter
#                           (which wraps `bob-core`), and the
#                           registry. This is what `src-tauri` and
#                           `bob-api` route runs through; it depends
#                           on `bob-core`, never the reverse.
#   * `crates/bob-api`    — axum HTTP server binary. Wraps
#                           `bob-core` in a small REST + SSE
#                           surface. Runs alongside Vite during
#                           `pnpm dev` so the browser preview can
#                           reach the same code the desktop build
#                           uses. Not shipped to end users.
#   * `crates/workspace-index`
#                         — pure markdown index/search core
#                           (parse + build snapshot + search). No
#                           Tauri / fs / SQLite deps, so it compiles
#                           to both native (for `src-tauri`) and WASM
#                           (for the browser). Mirrors `bob-core`'s
#                           "pure, reusable" discipline.
#   * `src-tauri`         — Tauri desktop host. Same `bob-core`
#                           backs every `#[tauri::command]`. This
#                           is the production runtime.
#
# Why a workspace at all (vs. independent crates):
#   * `src-tauri` + `bob-api` share `bob-core` via path
#     dependency. A workspace gives them one Cargo.lock so the
#     same `bob-core` version compiles in both — no risk of a
#     dev/prod skew where the browser preview runs different
#     logic than the desktop binary.
#   * `cargo test` / `cargo check` from the repo root touch
#     everything, so CI doesn't need per-crate invocations.
[workspace]
resolver = "2"
members = [
  "crates/bob-core",
  "crates/compose-core",
  "crates/bob-api",
  "crates/workspace-index",
  "crates/workspace-index-wasm",
  "src-tauri",
]

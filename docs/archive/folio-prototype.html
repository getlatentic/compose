<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace — Bob</title>
<style>
@import url("https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-sans@5/300.css");
@import url("https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-sans@5/400.css");
@import url("https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-sans@5/600.css");
@import url("https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-serif@5/400.css");
@import url("https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-mono@5/400.css");

:root{
  --background:#ffffff; --layer:#f4f4f4; --layer-hover:#e8e8e8; --layer-selected:#e0e0e0;
  --field:#f4f4f4; --border-subtle:#e0e0e0; --border-strong:#8d8d8d;
  --text-primary:#161616; --text-secondary:#525252; --text-placeholder:#a8a8a8;
  --link:#0f62fe; --interactive:#0f62fe; --primary:#0f62fe; --primary-hover:#0353e9; --primary-active:#002d9c;
  --accent-text:#002d9c; --info:#4589ff; --header:#161616; --header-hover:#2c2c2c; --focus:#0f62fe;
  --highlight:#d0e2ff; --highlight-bg:#edf5ff; --success:#24a148;
  --font:"IBM Plex Sans","Helvetica Neue",Arial,sans-serif;
  --serif:"IBM Plex Serif",Georgia,serif; --mono:"IBM Plex Mono",monospace;
}
[data-theme="dark"]{
  --background:#161616; --layer:#262626; --layer-hover:#333333; --layer-selected:#393939;
  --field:#262626; --border-subtle:#393939; --border-strong:#6f6f6f;
  --text-primary:#f4f4f4; --text-secondary:#c6c6c6; --text-placeholder:#6f6f6f;
  --link:#78a9ff; --accent-text:#78a9ff; --highlight:#0043ce; --highlight-bg:#001d6c;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--font);font-size:14px;line-height:20px;color:var(--text-primary);background:var(--background);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
::selection{background:var(--highlight);}

.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.body{display:flex;flex:1;min-height:0;}

/* Header */
.header{height:48px;flex:none;display:flex;align-items:center;background:var(--header);color:#fff;border-bottom:1px solid #393939;}
.h-btn{width:48px;height:48px;border:0;background:transparent;color:#fff;display:flex;align-items:center;justify-content:center;}
.h-btn:hover{background:var(--header-hover);}
.h-btn.on{background:var(--header-hover);}
.ws-switch{display:flex;align-items:center;gap:8px;background:transparent;border:0;color:#fff;height:48px;padding:0 12px 0 8px;font-size:14px;font-weight:600;}
.ws-switch:hover{background:var(--header-hover);}
.ws-switch svg:last-child{color:#8d8d8d;}
.crumbs{display:flex;align-items:center;gap:6px;font-size:13px;color:#a8a8a8;padding-left:8px;overflow:hidden;white-space:nowrap;}
.crumbs .sep{color:#6f6f6f;}
.crumbs .cur{color:#f4f4f4;}
.h-spacer{flex:1;}
.avatar{width:48px;height:48px;display:flex;align-items:center;justify-content:center;}
.avatar span{width:24px;height:24px;border-radius:50%;background:#393939;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
.h-divider{width:1px;height:24px;background:#393939;margin:0 4px;}

/* Files pane */
.files-pane{width:256px;flex:none;background:var(--background);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;}
.files-pane.collapsed{display:none;}
.files-head{display:flex;align-items:center;height:40px;padding:0 8px 0 16px;}
.files-head .lbl{flex:1;font-size:12px;font-weight:600;letter-spacing:.32px;color:var(--text-secondary);}
.files-search{padding:8px 16px;}
.files-search input{width:100%;height:32px;background:var(--field);border:0;border-bottom:1px solid var(--border-strong);padding:0 12px;font-family:inherit;font-size:13px;color:var(--text-primary);outline:none;}
.files-search input:focus{outline:2px solid var(--focus);outline-offset:-2px;}
.tree{flex:1;overflow-y:auto;padding-bottom:8px;}
.tree-row{display:flex;align-items:center;gap:6px;min-height:30px;font-size:14px;color:var(--text-primary);border-left:3px solid transparent;cursor:pointer;padding-right:8px;user-select:none;}
.tree-row:hover{background:var(--layer-hover);}
.tree-row.selected{background:var(--layer-selected);border-left-color:var(--interactive);font-weight:600;}
.tree-row svg{flex:none;color:var(--text-secondary);}
.tree-row.selected svg{color:var(--text-primary);}
.tree-row .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tree-chev{transition:transform .1s ease;}
.tree-chev.open{transform:rotate(90deg);}
.files-foot{height:32px;display:flex;align-items:center;gap:8px;padding:0 16px;border-top:1px solid var(--border-subtle);font-size:12px;color:var(--text-secondary);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex:none;}

/* Editor pane */
.editor-pane{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--background);overflow:hidden;}
.editor-bar{position:relative;height:48px;flex:none;display:flex;align-items:center;gap:10px;padding:0 8px 0 24px;border-bottom:1px solid var(--border-subtle);}
.editor-bar .fname{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;}
.tag{display:inline-flex;align-items:center;height:18px;padding:0 8px;border-radius:9px;font-size:12px;background:#e0e0e0;color:#393939;}
[data-theme="dark"] .tag{background:#393939;color:#f4f4f4;}
.tag.dark{background:#393939;color:#f4f4f4;}
.editor-bar .meta{font-size:12px;color:var(--text-secondary);}
.editor-bar .grow{flex:1;}
.icon-btn{width:36px;height:36px;border:0;background:transparent;color:var(--text-primary);display:flex;align-items:center;justify-content:center;}
.icon-btn.sm{width:32px;height:32px;}
.icon-btn:hover{background:var(--layer-hover);}
.icon-btn.active{background:var(--layer-selected);}
.review-flag{display:none;align-items:center;gap:6px;height:24px;padding:0 8px;background:var(--highlight-bg);color:var(--accent-text);font-size:12px;border-radius:9px;}
.review-flag.show{display:inline-flex;}
.editor-body{flex:1;overflow-y:auto;padding:40px 24px 48px;}
.doc{max-width:680px;margin:0 auto;}
.doc .kicker{font-size:12px;letter-spacing:.4px;color:var(--text-secondary);text-transform:uppercase;margin-bottom:8px;}
.doc h2{font-family:var(--font);font-size:30px;line-height:38px;font-weight:600;margin:0 0 20px;letter-spacing:-.01em;}
.doc h3{font-family:var(--font);font-size:18px;line-height:24px;font-weight:600;margin:28px 0 10px;}
.doc p,.doc li{font-family:var(--serif);font-size:17px;line-height:27px;color:var(--text-primary);}
.doc p{margin:0 0 16px;}
.doc ul{margin:0 0 16px;padding-left:22px;}
.doc li{margin-bottom:6px;}
.doc li b{font-weight:600;}
.edited{border-left:3px solid var(--interactive);background:var(--highlight-bg);padding:12px 16px;margin:0 0 16px;}
.edited .lab{display:flex;align-items:center;gap:6px;font-family:var(--font);font-size:12px;color:var(--accent-text);font-weight:600;margin-bottom:4px;}
.edited .from{font-family:var(--font);font-size:12px;color:var(--text-secondary);margin-bottom:8px;}
.edited p{margin:0;}
.suggest{border-left:3px solid var(--interactive);background:var(--highlight-bg);padding:14px 16px;margin:8px 0 0;}
.suggest .s-top{display:flex;align-items:center;gap:8px;font-family:var(--font);font-weight:600;font-size:14px;margin-bottom:4px;}
.suggest .s-top svg{color:var(--interactive);}
.suggest p{font-family:var(--font);font-size:13px;line-height:18px;color:var(--text-primary);margin:0 0 12px;}
.suggest .s-act{display:flex;align-items:center;gap:12px;}
.editor-status{height:24px;flex:none;display:flex;align-items:center;gap:16px;padding:0 24px;border-top:1px solid var(--border-subtle);font-size:12px;color:var(--text-secondary);}
.editor-status .grow{flex:1;}

.menu{position:absolute;top:46px;right:8px;min-width:208px;background:var(--background);border:1px solid var(--border-subtle);box-shadow:0 2px 8px rgba(0,0,0,.22);z-index:25;}
.menu button{display:block;width:100%;text-align:left;border:0;background:transparent;padding:11px 16px;font-size:14px;color:var(--text-primary);}
.menu button:hover{background:var(--layer-hover);}

/* Chat pane */
.chat-pane{width:360px;flex:none;display:flex;flex-direction:column;background:var(--layer);border-left:1px solid var(--border-subtle);}
.chat-bar{position:relative;flex:none;display:flex;align-items:center;gap:6px;height:48px;padding:0 8px 0 16px;border-bottom:1px solid var(--border-subtle);background:var(--background);}
.chat-switch{display:flex;align-items:center;gap:6px;background:transparent;border:0;font-size:14px;font-weight:600;color:var(--text-primary);max-width:200px;}
.chat-switch .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chat-switch svg{color:var(--text-secondary);flex:none;}
.chat-count{font-size:12px;color:var(--text-secondary);}
.chat-bar .grow{flex:1;}
.chat-list{position:absolute;top:48px;left:8px;right:8px;background:var(--background);border:1px solid var(--border-subtle);box-shadow:0 2px 8px rgba(0,0,0,.22);z-index:25;}
.chat-list .cl-search{padding:8px;border-bottom:1px solid var(--border-subtle);}
.chat-list .cl-search input{width:100%;height:32px;background:var(--field);border:0;border-bottom:1px solid var(--border-strong);padding:0 12px;font-size:13px;color:var(--text-primary);outline:none;font-family:inherit;}
.cl-item{display:flex;gap:10px;width:100%;text-align:left;border:0;background:transparent;padding:10px 14px;border-bottom:1px solid var(--border-subtle);align-items:flex-start;}
.cl-item:hover{background:var(--layer-hover);}
.cl-item.active{background:var(--layer-selected);border-left:3px solid var(--interactive);padding-left:11px;}
.cl-item svg{color:var(--text-secondary);margin-top:2px;flex:none;}
.cl-item .cl-body{flex:1;min-width:0;}
.cl-item .cl-name{font-size:14px;font-weight:600;display:flex;}
.cl-item .cl-sub{font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
.cl-item .cl-when{font-size:12px;color:var(--text-secondary);flex:none;}
.cl-foot{display:flex;align-items:center;padding:8px 14px;}
.cl-foot .grow{flex:1;}
.cl-foot button{background:transparent;border:0;color:var(--link);font-size:13px;display:inline-flex;align-items:center;gap:6px;}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;}
.msg{margin-bottom:20px;}
.msg .who{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary);font-weight:600;margin-bottom:4px;}
.bob-mark{width:16px;height:16px;background:var(--interactive);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;}
.provenance{display:inline-flex;align-items:center;gap:4px;font-weight:400;font-size:11px;background:var(--layer-selected);color:var(--text-secondary);padding:1px 8px;border-radius:9px;}
.msg .bubble{font-size:14px;line-height:20px;}
.msg.user{display:flex;justify-content:flex-end;}
.msg.user .bubble{background:var(--primary);color:#fff;padding:10px 12px;max-width:280px;}
.msg.assistant .bubble{color:var(--text-primary);}
.msg.assistant .bubble ul{margin:6px 0;padding-left:20px;}
.preview{border:1px solid var(--border-subtle);border-left:3px solid var(--interactive);background:var(--background);padding:12px;margin-top:8px;}
.preview .p-head{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--accent-text);margin-bottom:6px;}
.preview .p-detail{font-size:13px;line-height:18px;margin-bottom:12px;}
.preview .p-act{display:flex;gap:8px;}
.empty-chat{color:var(--text-secondary);font-size:14px;line-height:20px;}
.connect-banner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;}
.connect-banner .cb-icon{width:48px;height:48px;background:var(--layer-selected);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);margin-bottom:16px;}
.connect-banner h3{font-size:16px;font-weight:600;margin:0 0 6px;}
.connect-banner p{font-size:13px;color:var(--text-secondary);margin:0 0 16px;line-height:18px;}

.btn{height:40px;display:inline-flex;align-items:center;gap:20px;justify-content:space-between;border:1px solid transparent;font-size:14px;line-height:18px;padding:0 12px 0 16px;}
.btn.primary{background:var(--primary);color:#fff;}
.btn.primary:hover{background:var(--primary-hover);}
.btn.ghost{background:transparent;color:var(--link);}
.btn.ghost:hover{background:var(--layer-hover);}
.btn.sec{background:transparent;color:var(--text-primary);border-color:var(--border-strong);}
.btn.sec:hover{background:var(--layer-hover);}
.btn svg{flex:none;}
.linklike{background:transparent;border:0;color:var(--link);font-size:14px;padding:6px 0;display:inline-flex;align-items:center;gap:6px;}

.chat-foot{flex:none;border-top:1px solid var(--border-subtle);}
.ctx-row{display:flex;align-items:center;gap:8px;padding:8px 12px 0;}
.ctx-chip{display:inline-flex;align-items:center;gap:6px;background:var(--primary);color:#fff;font-size:12px;padding:3px 8px;border-radius:9px;}
.chat-composer{display:flex;background:var(--field);border-bottom:1px solid var(--border-strong);margin:8px 12px 0;}
.chat-composer textarea{flex:1;border:0;background:transparent;resize:none;outline:none;font-family:inherit;font-size:14px;line-height:20px;padding:10px 12px;height:40px;color:var(--text-primary);}
.chat-composer textarea::placeholder{color:var(--text-placeholder);}
.chat-composer .send{width:40px;height:40px;border:0;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;}
.chat-composer .send:hover{background:var(--primary-hover);}
.chat-meta{display:flex;align-items:center;padding:6px 12px 10px;font-size:11px;color:var(--text-secondary);}
.chat-meta .grow{flex:1;}

/* Overlays */
.overlay{position:fixed;inset:0;background:rgba(22,22,22,.55);display:flex;align-items:flex-start;justify-content:center;z-index:40;padding:48px 16px;overflow:auto;}
.modal{background:var(--background);width:100%;max-width:600px;border:1px solid var(--border-subtle);display:flex;flex-direction:column;}
.modal-head{display:flex;align-items:center;padding:16px 8px 16px 24px;border-bottom:1px solid var(--border-subtle);}
.modal-head h2{font-size:20px;line-height:28px;font-weight:600;margin:0;flex:1;}
.modal-body{padding:0 24px;overflow:auto;}
.modal-foot{display:flex;justify-content:flex-end;border-top:1px solid var(--border-subtle);}
.modal-foot .btn{height:48px;}
.set-wrap{display:flex;min-height:420px;}
.set-nav{width:180px;flex:none;border-right:1px solid var(--border-subtle);padding:16px 0;}
.set-nav .cat{font-size:12px;letter-spacing:.32px;color:var(--text-secondary);padding:0 16px 8px;font-weight:600;}
.set-nav button{display:block;width:100%;text-align:left;border:0;background:transparent;padding:8px 16px;font-size:14px;color:var(--text-primary);border-left:3px solid transparent;}
.set-nav button:hover{background:var(--layer-hover);}
.set-nav button.active{background:var(--layer-selected);border-left-color:var(--interactive);font-weight:600;}
.set-main{flex:1;padding:24px;}
.set-main h3{font-size:22px;margin:0 0 4px;font-weight:600;}
.set-main .sub{color:var(--text-secondary);font-size:13px;margin:0 0 20px;}
.set-row{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--border-subtle);}
.set-row:last-child{border-bottom:0;}
.set-row .lhs{width:180px;flex:none;}
.set-row .lhs .t{font-size:14px;font-weight:600;}
.set-row .lhs .d{font-size:12px;color:var(--text-secondary);margin-top:2px;line-height:16px;}
.set-row .rhs{flex:1;}
.kv{display:flex;align-items:center;gap:12px;font-size:14px;}
.kv .mono{font-family:var(--mono);font-size:13px;color:var(--text-secondary);}
.toggle{display:flex;align-items:center;gap:12px;background:transparent;border:0;padding:6px 0;}
.toggle .track{width:40px;height:22px;background:var(--border-strong);border-radius:11px;position:relative;transition:background .12s;}
.toggle.on .track{background:var(--success);}
.toggle .knob{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .12s;}
.toggle.on .knob{left:21px;}
.toggle .tl{font-size:14px;color:var(--text-primary);}
.seg{display:inline-flex;border:1px solid var(--border-strong);}
.seg button{height:38px;padding:0 18px;border:0;background:var(--background);color:var(--text-primary);border-right:1px solid var(--border-strong);}
.seg button:last-child{border-right:0;}
.seg button.active{background:var(--primary);color:#fff;}
.field-label{font-size:12px;color:var(--text-secondary);margin:14px 0 6px;}
.input-wrap{position:relative;}
.text-input{height:40px;width:100%;background:var(--field);border:0;border-bottom:1px solid var(--border-strong);padding:0 40px 0 16px;font-family:var(--mono);font-size:13px;color:var(--text-primary);outline:none;}
.text-input:focus{outline:2px solid var(--focus);outline-offset:-2px;}
.input-wrap .eye{position:absolute;right:8px;top:8px;width:24px;height:24px;border:0;background:transparent;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;}
.helper{font-size:12px;color:var(--text-secondary);margin-top:6px;line-height:16px;}
.infobox{border-left:3px solid var(--interactive);background:var(--highlight-bg);padding:12px 16px;margin-top:16px;}
.infobox .it{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:4px;}
.infobox p{font-size:12px;line-height:17px;color:var(--text-primary);margin:0;}
.provider-card{display:flex;align-items:center;gap:12px;border:1px solid var(--border-strong);border-left:3px solid var(--interactive);padding:12px 16px;}
.provider-card .pc-mark{width:28px;height:28px;background:var(--interactive);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;}
.provider-card .pc-name{font-size:14px;font-weight:600;}
.provider-card .pc-sub{font-size:12px;color:var(--text-secondary);}
.provider-card .grow{flex:1;}
.coming{font-size:12px;color:var(--text-secondary);margin-top:8px;}

/* Onboarding */
.onb{max-width:520px;}
.onb-steps{display:flex;align-items:center;gap:8px;padding:16px 24px 0;font-size:13px;color:var(--text-secondary);}
.onb-steps .st{display:flex;align-items:center;gap:8px;}
.onb-steps .num{width:22px;height:22px;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:12px;}
.onb-steps .st.active .num{border-color:var(--interactive);color:var(--interactive);}
.onb-steps .st.done .num{background:var(--interactive);border-color:var(--interactive);color:#fff;}
.onb-steps .st.active .lab{color:var(--text-primary);font-weight:600;}
.onb-steps .line{flex:1;height:1px;background:var(--border-subtle);min-width:16px;}
.onb-body{padding:24px;}
.onb-icon{width:48px;height:48px;background:var(--interactive);color:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.onb-body h2{font-size:26px;line-height:32px;font-weight:600;margin:0 0 12px;}
.onb-lead{color:var(--text-secondary);font-size:15px;line-height:23px;margin:0 0 8px;}
.onb-points{margin-top:20px;}
.onb-point{display:flex;gap:12px;margin-bottom:14px;}
.onb-point svg{color:var(--text-secondary);flex:none;margin-top:2px;}
.onb-point .pt{font-size:14px;font-weight:600;}
.onb-point .pd{font-size:13px;color:var(--text-secondary);line-height:18px;}
.onb-check{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border-subtle);}
.onb-check:last-of-type{border-bottom:0;}
.onb-check .ic{color:var(--text-secondary);}
.onb-check .ct{font-size:14px;font-weight:600;}
.onb-check .cd{font-size:12px;color:var(--text-secondary);}
.onb-check .grow{flex:1;}
.onb-foot{display:flex;align-items:center;gap:12px;padding:16px 24px;border-top:1px solid var(--border-subtle);}
.onb-foot .grow{flex:1;}
.ready-mark{width:48px;height:48px;background:var(--success);color:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}

.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;}
.toast{display:flex;align-items:flex-start;gap:12px;min-width:320px;max-width:440px;background:#393939;color:#fff;border-left:3px solid var(--info);padding:14px 16px;animation:rise .18s ease;}
.toast .t-text{flex:1;font-size:14px;line-height:18px;}
.toast button{background:transparent;border:0;color:#fff;display:flex;align-items:center;}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
/* Editor tabs */
.tabs{display:flex;height:38px;flex:none;border-bottom:1px solid var(--border-subtle);background:var(--layer);overflow-x:auto;}
.tab{display:flex;align-items:center;gap:8px;padding:0 6px 0 12px;height:38px;border-right:1px solid var(--border-subtle);font-size:13px;color:var(--text-secondary);background:transparent;white-space:nowrap;max-width:200px;cursor:pointer;}
.tab:hover{background:var(--layer-hover);}
.tab.active{background:var(--background);color:var(--text-primary);box-shadow:inset 0 -2px 0 var(--interactive);}
.tab svg{flex:none;color:inherit;}
.tab .tn{overflow:hidden;text-overflow:ellipsis;}
.tab .x{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);}
.tab .x:hover{background:var(--layer-selected);color:var(--text-primary);}
.editor-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-secondary);gap:8px;}

/* Setup window onboarding */
.setup-overlay{position:fixed;inset:0;background:#e8e8e3;display:flex;align-items:center;justify-content:center;z-index:40;padding:24px;}
[data-theme="dark"] .setup-overlay{background:#0a0a0a;}
.setup-window{width:100%;max-width:1000px;height:min(680px,calc(100vh - 48px));background:var(--background);border:1px solid var(--border-subtle);display:flex;flex-direction:column;box-shadow:0 14px 50px rgba(0,0,0,.32);}
.setup-titlebar{height:36px;flex:none;display:flex;align-items:center;border-bottom:1px solid var(--border-subtle);position:relative;}
.setup-lights{display:flex;gap:8px;padding-left:14px;}
.setup-lights i{width:12px;height:12px;border-radius:50%;display:block;}
.setup-lights i.r{background:#ff5f57;} .setup-lights i.y{background:#febc2e;} .setup-lights i.g{background:#28c840;}
.setup-title{position:absolute;left:0;right:0;text-align:center;font-size:13px;color:var(--text-secondary);}
.setup-steps{display:flex;align-items:center;padding:20px 40px 0;flex:none;}
.setup-steps .st{display:flex;align-items:center;gap:10px;}
.setup-steps .num{width:24px;height:24px;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-secondary);}
.setup-steps .st.active .num{border-color:var(--interactive);color:var(--interactive);}
.setup-steps .st.done .num{background:var(--interactive);border-color:var(--interactive);color:#fff;}
.setup-steps .lab{font-size:15px;color:var(--text-placeholder);}
.setup-steps .st.active .lab{color:var(--text-primary);font-weight:600;}
.setup-steps .st.done .lab{color:var(--text-secondary);}
.setup-steps .line{flex:1;height:1px;background:var(--border-subtle);margin:0 16px;min-width:24px;}
.setup-body{flex:1;display:flex;gap:48px;padding:36px 40px;overflow:auto;}
.setup-left{flex:1;min-width:0;display:flex;flex-direction:column;}
.setup-right{flex:1;min-width:0;display:flex;flex-direction:column;}
.setup-kicker{font-family:var(--mono);font-size:12px;letter-spacing:.5px;color:var(--link);margin-bottom:14px;}
.setup-h1{font-size:40px;line-height:44px;font-weight:600;letter-spacing:-.02em;margin:0 0 18px;}
.setup-h2{font-size:28px;line-height:34px;font-weight:600;margin:0 0 10px;}
.setup-lead{font-family:var(--serif);font-size:16px;line-height:25px;color:var(--text-primary);margin:0 0 24px;max-width:440px;}
.setup-val{display:flex;gap:14px;margin-bottom:16px;}
.setup-val .vi{width:32px;height:32px;flex:none;background:var(--layer);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);}
.setup-val .vt{font-size:14px;font-weight:600;}
.setup-val .vd{font-size:13px;color:var(--text-secondary);line-height:18px;}
.setup-actions{display:flex;align-items:center;gap:20px;margin-top:auto;padding-top:24px;}
.setup-actions .btn{height:48px;}
.preview-card{background:var(--layer);border:1px solid var(--border-subtle);padding:24px;position:relative;flex:1;min-height:320px;}
.preview-card .pc-crumb{font-size:12px;color:var(--text-secondary);margin-bottom:14px;}
.preview-card .pc-h{font-family:var(--serif);font-size:22px;margin-bottom:18px;}
.preview-card .ln{height:8px;background:var(--layer-selected);border-radius:2px;margin-bottom:12px;}
.preview-card .float-msg{position:absolute;right:18px;bottom:24px;left:64px;background:var(--background);border:1px solid var(--border-subtle);box-shadow:0 8px 20px rgba(0,0,0,.18);padding:12px;}
.preview-card .float-msg .fm-top{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;margin-bottom:6px;}
.preview-card .fm-mark{width:16px;height:16px;background:var(--interactive);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;}
.preview-card .float-msg p{font-size:13px;line-height:18px;margin:0;}
.right-label{font-size:12px;letter-spacing:.4px;color:var(--text-secondary);margin-bottom:16px;}
.benefit{border-left:3px solid var(--interactive);background:var(--layer);padding:12px 16px;margin-bottom:12px;}
.benefit .bt{font-size:14px;font-weight:600;}
.benefit .bd{font-size:13px;color:var(--text-secondary);line-height:18px;margin-top:2px;}
.struct{border:1px solid var(--border-subtle);}
.struct .row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border-subtle);font-family:var(--mono);font-size:13px;}
.struct .row:last-child{border-bottom:0;}
.struct .row.muted{color:var(--text-secondary);}
.struct .row .hint{margin-left:auto;font-family:var(--font);font-size:12px;color:var(--text-secondary);}
.struct-note{border-left:3px solid var(--border-strong);padding:8px 14px;margin-top:14px;font-size:13px;line-height:18px;color:var(--text-secondary);}
.radio-card{display:flex;gap:12px;border:1px solid var(--border-subtle);padding:14px 16px;cursor:pointer;}
.radio-card+.radio-card{border-top:0;}
.radio-card.sel{background:var(--layer-selected);}
.radio-dot{width:18px;height:18px;border-radius:50%;border:1px solid var(--border-strong);flex:none;margin-top:1px;position:relative;}
.radio-card.sel .radio-dot{border-color:var(--interactive);}
.radio-card.sel .radio-dot::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--interactive);}
.radio-card .rt{font-size:14px;font-weight:600;}
.radio-card .rd{font-size:13px;color:var(--text-secondary);line-height:18px;margin-top:2px;}
.radio-card .rpath{font-family:var(--mono);font-size:12px;color:var(--text-secondary);margin-top:6px;}
.mini3{display:flex;border:1px solid var(--border-subtle);height:210px;}
.mini3 .m-files{width:28%;border-right:1px solid var(--border-subtle);padding:12px;}
.mini3 .m-ed{flex:1;padding:12px;}
.mini3 .m-chat{width:30%;border-left:1px solid var(--border-subtle);padding:12px;background:var(--layer);}
.mini3 .mln{height:7px;background:var(--layer-selected);border-radius:2px;margin-bottom:8px;}
.mini3 .mln.b{background:var(--interactive);opacity:.75;}
.ready-check2{display:flex;gap:12px;align-items:center;padding:14px 16px;border:1px solid var(--border-subtle);}
.ready-check2+.ready-check2{border-top:0;}
.ready-check2 .grow{flex:1;}
.ready-check2 .rt{font-size:14px;font-weight:600;}
.ready-check2 .rd{font-size:12px;color:var(--text-secondary);}

:focus-visible{outline:2px solid var(--focus);outline-offset:-2px;}

function truncate(s,n){s=s||'';n=n||40;return s.length>n?s.slice(0,n)+'…':s;}
function stripTags(s){return (s||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();}

function pathOf(id){
  let res=null;
  function walk(nodes,anc){for(const n of nodes){if(n.t==='file'){if(n.id===id){res={folders:anc.slice(),name:n.name};}}else{walk(n.children,anc.concat(n.name));}}}

  return res||{folders:[],name:''};
}

function nodeRow(n,depth){
  const pad=12+depth*16;
  if(n.t==='folder'){
    const open=!!state.expanded[n.id];
    let html=`<div class="tree-row" data-folder="${n.id}" style="padding-left:${pad}px"><span class="tree-chev ${open?'open':''}">${ICONS.chev}</span>${ICONS.folder}<span class="nm">${n.name}</span></div>`;
    if(open) html+=n.children.map(c=>nodeRow(c,depth+1)).join('');
    return html;
  }
  return fileRow(n,depth);
}
function fileRow(n,depth){
  const pad=12+depth*16+18;
  const sel=state.openFileId===n.id?'selected':'';
  const ic=n.kind==='img'?ICONS.img:ICONS.file;
  return `<div class="tree-row ${sel}" data-file="${n.id}" style="padding-left:${pad}px" role="button" tabindex="0">${ic}<span class="nm">${n.name}</span></div>`;
}

  const d=DOCS[state.openFileId];
  const tabs=state.openTabs.map(id=>{const td=DOCS[id];const ic=td.img?ICONS.img:ICONS.file;return `<div class="tab ${id===state.openFileId?'active':''}" data-tab="${id}">${ic}<span class="tn">${td.name}</span><span class="x" data-tabclose="${id}" aria-label="Close">${ICONS.close}</span></div>`;}).join('');

      <button class="icon-btn" id="exportBtn" aria-label="Export">${ICONS.exp}</button>

function renderChat(){
  if(!state.bobConnected){
    chatPane.innerHTML=`<div class="chat-bar"><span class="chat-switch"><span class="bob-mark">${ICONS.sparkw}</span><span class="nm">Bob</span></span></div>
      <div class="connect-banner"><div class="cb-icon">${ICONS.key}</div><h3>Connect Bob to start chatting</h3><p>Your notebook works without Bob. Add a key and Bob can read, edit, and create files alongside you.</p><button class="btn primary" id="connectBobBtn">Connect Bob ${ICONS.send}</button></div>`;
    return;
  }
  const c=activeChat();
  const chatList=state.showChatList?`<div class="chat-list">
    <div class="cl-search">${ICONS.search}<input placeholder="Find a chat..." style="margin-left:0"></div>
    ${state.chats.map(ch=>{const last=ch.messages.length?stripTags(ch.messages[ch.messages.length-1].text):'New chat · no messages yet';return `<button class="cl-item ${ch.id===state.activeChatId?'active':''}" data-chat="${ch.id}">${ICONS.chat}<div class="cl-body"><div class="cl-name">${ch.name}<span style="flex:1"></span><span class="cl-when">${ch.when}</span></div><div class="cl-sub">${truncate(last,46)}</div></div></button>`;}).join('')}
    <div class="cl-foot"><button data-newchat="1">${ICONS.plus} New chat</button><span class="grow"></span><button>${ICONS.clock} All chats</button></div>
  </div>`:'';
  let msgs=c.messages.map(m=>{
    if(m.role==='user') return `<div class="msg user"><div class="bubble">${m.text}</div></div>`;
    const pill=m.pill?`<span class="provenance">${ICONS.file} read · ${m.pill}</span>`:'';
    return `<div class="msg assistant"><div class="who"><span class="bob-mark">${ICONS.sparkw}</span>Bob ${pill}</div><div class="bubble">${m.text}</div></div>`;
  }).join('');
  if(!c.messages.length) msgs=`<div class="empty-chat">New conversation. Ask Bob about the open file or anything in your workspace.</div>`;
  if(c.pending){
    msgs+=`<div class="msg assistant"><div class="preview"><div class="p-head">${ICONS.spark} Preview · ${c.pending.label}</div><div class="p-detail">${c.pending.detail}</div><div class="p-act"><button class="btn primary" id="acceptBtn">Accept ${ICONS.check}</button><button class="btn ghost" id="discardBtn">Discard</button></div></div></div>`;
  }
  const openName=state.openFileId?DOCS[state.openFileId].name:'workspace';
  chatPane.innerHTML=`
    <div class="chat-bar">
      <button class="chat-switch" id="chatSwitch"><span class="bob-mark">${ICONS.sparkw}</span><span class="nm">${c.name}</span>${ICONS.chevd}</button>
      <span class="chat-count">(${state.chats.length} chats)</span>
      <span class="grow"></span>
      <button class="icon-btn sm" id="newChatBtn" aria-label="New chat">${ICONS.plus}</button>
      <button class="icon-btn sm" aria-label="More">${ICONS.dots}</button>
      ${chatList}
    </div>
    <div class="chat-msgs" id="chatMsgs">${msgs}</div>
    <div class="chat-foot">
      <div class="ctx-row"><span class="ctx-chip">${ICONS.ctx} ${openName}</span></div>
      <div class="chat-composer"><textarea id="chatInput" rows="1" placeholder="Ask Bob about your workspace..."></textarea><button class="send" id="chatSend" aria-label="Send">${ICONS.send}</button></div>
      <div class="chat-meta"><span>Bob · workspace context on</span><span class="grow"></span><span>⌘⏎ to send</span></div>
    </div>`;
  const wrap=document.getElementById('chatMsgs');if(wrap)wrap.scrollTop=wrap.scrollHeight;
}

/* Behaviour */
function openFile(id){if(!state.openTabs.includes(id))state.openTabs.push(id);state.openFileId=id;state.showExport=false;render();}
function closeTab(id){const i=state.openTabs.indexOf(id);if(i<0)return;state.openTabs.splice(i,1);if(state.openFileId===id)state.openFileId=state.openTabs[Math.max(0,i-1)]||state.openTabs[0]||null;render();}
function setTheme(t){state.theme=t;document.documentElement.setAttribute('data-theme',t);render();}
function toggleTheme(){setTheme(state.theme==='dark'?'light':'dark');}

function addMsg(role,obj){const c=activeChat();c.messages.push(Object.assign({role},obj));if(role==='user'&&c.name==='Untitled chat')c.name=truncate(obj.text,26);}
function newChat(){const id='c'+state.nextChat++;state.chats.push({id,name:'Untitled chat',when:'now',messages:[],pending:null,touched:[]});state.activeChatId=id;state.showChatList=false;renderChat();}
function switchChat(id){state.activeChatId=id;state.showChatList=false;renderChat();}

function proposeFor(){
  const c=activeChat();if(!state.openFileId){addMsg('assistant',{text:'Open a file from the tree and I can read it, or ask me anything about your workspace.'});c.pending=null;return;}
  const d=DOCS[state.openFileId];
  if(d.summary && !state.docEdits[state.openFileId]){
    addMsg('assistant',{pill:d.name,text:"I'll tighten the opening so it leads with the rhythm and trims the throat-clearing. Here is the change before it touches the file."});
    c.pending={label:'1 edit',detail:'Replace the opening paragraph in '+d.name+' with a shorter version.',source:lastUserText(),apply:applyEdit};
  } else if(d.summary){
    addMsg('assistant',{pill:d.name,text:'That opening is already tightened. Want me to look at another section, or work on a different file?'});
  } else {
    addMsg('assistant',{pill:d.name,text:'Read '+d.name+'. It is short and clear as is. I can expand a point, draft a summary, or pull anything here into another note. Just say which.'});
  }
}
function lastUserText(){const m=activeChat().messages;for(let i=m.length-1;i>=0;i--)if(m[i].role==='user')return m[i].text;return '';}
function applyEdit(){
  const id=state.openFileId,c=activeChat();state.docEdits[id]=true;
  if(!c.touched.includes(DOCS[id].name))c.touched.push(DOCS[id].name);
  state.history.push({label:'Edited '+DOCS[id].name+' · from "'+truncate(c.pending&&c.pending.source,30)+'"',revert:()=>{state.docEdits[id]=false;}});
  addMsg('assistant',{text:'Done. The opening is updated and highlighted in the file, and linked to this conversation in history. Undo any time.'});
  toast('Updated '+DOCS[id].name);
}
function acceptPending(){const c=activeChat();if(!c.pending)return;const a=c.pending.apply;c.pending=null;a();render();}
function discardPending(){const c=activeChat();if(!c.pending)return;c.pending=null;addMsg('assistant',{text:'Discarded. Nothing changed.'});renderChat();}
function undoLast(){const l=state.history.pop();if(!l)return;l.revert();toast('Reverted: '+l.label);render();}

function sendChat(text){if(!text.trim()||!state.bobConnected)return;addMsg('user',{text:text.trim()});activeChat().pending=null;renderChat();setTimeout(()=>{proposeFor();renderChat();renderEditor();},460);}

function connectBob(key){state.bobConnected=true;state.apiKey=key||state.apiKey||'sk-bob-demo';toast('Bob connected');render();}

    ${steps}
    <div class="setup-body"><div class="setup-left">${left}</div><div class="setup-right">${right}</div></div>
  </div></div>`;
}
function closeOverlay(){overlayRoot.innerHTML='';}

function toast(text){const wrap=document.getElementById('toasts');const el=document.createElement('div');el.className='toast';el.innerHTML=`<span class="t-text">${text}</span><button aria-label="Dismiss">${ICONS.close}</button>`;el.querySelector('button').onclick=()=>el.remove();wrap.appendChild(el);setTimeout(()=>el.remove(),4200);}

/* Events */
document.getElementById('menuBtn').onclick=()=>{state.filesCollapsed=!state.filesCollapsed;render();};
themeBtn.onclick=toggleTheme;
document.getElementById('settingsBtn').onclick=()=>openSettings();
document.getElementById('wsBtn').onclick=()=>toast('Workspace switcher (prototype)');

filesPane.addEventListener('click',e=>{
  const f=e.target.closest('[data-file]');if(f)return openFile(f.dataset.file);
  const fo=e.target.closest('[data-folder]');if(fo){state.expanded[fo.dataset.folder]=!state.expanded[fo.dataset.folder];renderFiles();}
});
filesPane.addEventListener('input',e=>{if(e.target.id==='fileSearch'){state.fileQuery=e.target.value;renderFiles();const i=document.getElementById('fileSearch');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}}});
filesPane.addEventListener('keydown',e=>{const f=e.target.closest('[data-file]');if(f&&(e.key==='Enter'||e.key===' ')){e.preventDefault();openFile(f.dataset.file);}});

editorPane.addEventListener('click',e=>{
  const tc=e.target.closest('[data-tabclose]');if(tc){e.stopPropagation();return closeTab(tc.dataset.tabclose);}
  const tb=e.target.closest('[data-tab]');if(tb)return openFile(tb.dataset.tab);
  if(e.target.closest('#exportBtn')){state.showExport=!state.showExport;return renderEditor();}
  const ex=e.target.closest('[data-export]');if(ex){state.showExport=false;toast('Exported '+DOCS[state.openFileId].name+' as '+ex.dataset.export.toUpperCase());return renderEditor();}
  if(e.target.closest('#editBtn')){state.editMode=true;return renderEditor();}
  if(e.target.closest('#previewBtn')){state.editMode=false;return renderEditor();}
  if(e.target.closest('#sugAdd')){state.suggestDismissed=true;toast('Added cross-links to temple list.md');return renderEditor();}
  if(e.target.closest('#sugDismiss')){state.suggestDismissed=true;return renderEditor();}
});

chatPane.addEventListener('click',e=>{
  if(e.target.closest('#connectBobBtn')){state.onbStep=1;return openOnboarding();}
  if(e.target.closest('#chatSwitch')){state.showChatList=!state.showChatList;return renderChat();}
  if(e.target.closest('#newChatBtn')||e.target.closest('[data-newchat]'))return newChat();
  const ci=e.target.closest('[data-chat]');if(ci)return switchChat(ci.dataset.chat);
  if(e.target.closest('#acceptBtn'))return acceptPending();
  if(e.target.closest('#discardBtn'))return discardPending();
  if(e.target.closest('#chatSend')){const t=document.getElementById('chatInput');const v=t.value;t.value='';return sendChat(v);}
});
chatPane.addEventListener('keydown',e=>{if(e.target.id==='chatInput'&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();const v=e.target.value;e.target.value='';sendChat(v);}});

overlayRoot.addEventListener('click',e=>{
  if(e.target.closest('[data-close]'))return closeOverlay();
  const sec=e.target.closest('[data-sec]');if(sec)return openSettings(sec.dataset.sec);
  const th=e.target.closest('[data-theme-set]');if(th){setTheme(th.dataset.themeSet);return openSettings();}
  const fa=e.target.closest('[data-fa]');if(fa){state.fileAccess[fa.dataset.fa]=!state.fileAccess[fa.dataset.fa];return openSettings();}
  if(e.target.closest('[data-disconnect]')){state.bobConnected=false;closeOverlay();render();toast('Bob disconnected');return;}
  if(e.target.closest('[data-setconnect]')){const k=document.getElementById('setKey');connectBob(k?k.value:'');return openSettings();}
  const eye=e.target.closest('[data-eye]');if(eye){if(eye.dataset.eye==='onb'){state.onbReveal=!state.onbReveal;const ik=document.getElementById('onbKey');if(ik)state.onbKey=ik.value;return openOnboarding();}else{const i=document.getElementById('setKey');if(i)i.type=i.type==='password'?'text':'password';return;}}
  if(e.target.closest('[data-getkey]'))return toast('Opens your provider console (prototype)');
  const wsm=e.target.closest('[data-wsmode]');if(wsm){state.onbWorkspaceMode=wsm.dataset.wsmode;return openOnboarding();}
  const onb=e.target.closest('[data-onb]');if(onb){
    const a=onb.dataset.onb;const ik=document.getElementById('onbKey');if(ik)state.onbKey=ik.value;
    if(a==='next')state.onbStep=1;
    else if(a==='back')state.onbStep--;
    else if(a==='skip'){state.onboarded=true;return closeOverlay();}
    else if(a==='connect'){state.bobConnected=true;state.apiKey=state.onbKey||'sk-bob-demo';state.onbStep=2;}
    else if(a==='skipkey'){state.bobConnected=false;state.onbStep=2;}
    else if(a==='create')state.onbStep=3;
    else if(a==='open'){state.onboarded=true;closeOverlay();return render();}
    openOnboarding();return;
  }
});
overlayRoot.addEventListener('input',e=>{if(e.target.id==='onbKey')state.onbKey=e.target.value;});

document.documentElement.setAttribute('data-theme',state.theme);
render();
openOnboarding();
</script>
</body>
</html>
